services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maatenaatre
      POSTGRES_USER: maatenaatre
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maatenaatre"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://maatenaatre:${DB_PASSWORD:-secret}@db:5432/maatenaatre
      JWT_SECRET: ${JWT_SECRET:-changeme}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@maatenaatre.lv}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
